<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Праздник к нам приходит</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 35px 35px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .input-group input {
            flex: 2 1 180px;
            padding: 12px 18px;
            font-size: 16px;
            border: 2px solid #d0d7de;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
            background: #fafbfc;
        }

        .input-group input:focus {
            border-color: #2d7aff;
            background: white;
        }

        .input-group button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            background: #2d7aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-group button:hover {
            background: #1a5fd9;
        }

        .input-group button:active {
            transform: scale(0.97);
        }

        .result-block {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px 20px;
            border-left: 4px solid #2d7aff;
        }

        .result-item:last-child {
            border-left-color: #28a745;
        }

        .result-label {
            font-size: 13px;
            color: #6c757d;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .result-value.days {
            color: #2d7aff;
        }

        .result-value.leap {
            color: #28a745;
        }

        .hint {
            margin-top: 18px;
            font-size: 13px;
            color: #8b95a1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎄 Новый год</h1>

        <div class="input-group">
            <input type="text" id="dateInput" placeholder="дд.мм.гггг" value="31.12.2025" />
            <button id="calcButton">Рассчитать</button>
        </div>

        <div class="result-block">
            <div class="result-item">
                <div class="result-label">Дней до Нового года</div>
                <div class="result-value days" id="daysOutput">—</div>
            </div>
            <div class="result-item">
                <div class="result-label">Високосный год</div>
                <div class="result-value leap" id="leapOutput">—</div>
            </div>
        </div>

        <div class="hint">Формат: дд.мм.гггг</div>
    </div>

    <script>
        (function() {
            const dateInput = document.getElementById('dateInput');
            const calcButton = document.getElementById('calcButton');
            const daysOutput = document.getElementById('daysOutput');
            const leapOutput = document.getElementById('leapOutput');

            function isLeapYear(year) {
                return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            }

            function parseDateString(dateStr) {
                if (typeof dateStr !== 'string') return null;
                const trimmed = dateStr.trim();
                const parts = trimmed.split('.');
                if (parts.length !== 3) return null;

                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10);
                const year = parseInt(parts[2], 10);

                if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
                if (day < 1 || day > 31 || month < 1 || month > 12 || year < 0 || year > 9999) return null;

                const testDate = new Date(year, month - 1, day);
                if (testDate.getFullYear() !== year || testDate.getMonth() !== month - 1 || testDate.getDate() !== day) {
                    return null;
                }

                return { day, month, year };
            }

            function calculateNewYearInfo(dateStr) {
                const parsed = parseDateString(dateStr);
                if (!parsed) {
                    return {
                        valid: false,
                        daysUntilNewYear: null,
                        isLeap: null
                    };
                }

                const { day, month, year } = parsed;

                const userDate = new Date(Date.UTC(year, month - 1, day, 0, 0, 0));
                const newYearDate = new Date(Date.UTC(year, 11, 31, 0, 0, 0));

                let diffTime = newYearDate.getTime() - userDate.getTime();
                let daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (daysLeft < 0) daysLeft = 0;

                const leap = isLeapYear(year);

                return {
                    valid: true,
                    daysUntilNewYear: daysLeft,
                    isLeap: leap
                };
            }

            function updateUI() {
                const inputValue = dateInput.value;
                const result = calculateNewYearInfo(inputValue);

                if (!result.valid) {
                    daysOutput.textContent = 'Ошибка';
                    leapOutput.textContent = 'Неверный формат';
                    return;
                }

                daysOutput.textContent = result.daysUntilNewYear + ' дн.';
                leapOutput.textContent = result.isLeap ? 'Високосный' : 'Не високосный';
            }

            calcButton.addEventListener('click', updateUI);

            dateInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    updateUI();
                }
            });

            window.addEventListener('DOMContentLoaded', updateUI);
        })();
    </script>

</body>
</html>
